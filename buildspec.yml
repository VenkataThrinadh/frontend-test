version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18

  build:
    commands:
      - npm install
      - npm run build

  post_build:
    commands:
      - echo Uploading to S3
      - aws s3 sync build/ s3://www.crmtesting.work.gd --delete

      - echo Clearing CloudFront cache
      - aws cloudfront create-invalidation --distribution-id ECWF4NPB5JUID --paths "/*"

artifacts:
  files:
    - '**/*'